<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style1.css">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <section class="tag">
    <h4 class="tag-title">Your Result</h4>
    <div class="tag-score">
      <h1 class="tag-score-h1">76</h1>
      <p class="tag-score-p">of 100</p>
    </div>
    <h1 class="tag-h1">Great</h1>
    <P class="tag-p1">You scored higher than 65% of</P>
    <p class="tag-p2">the people who have taken</p> 
    <p class="tag-p3">these tests.</p>
  </section>
  
  <section class="tasks">
    <div class="tasks1">
    <h1>Summary</h1>
    <div class="tasks2">
      <img src="./assets/images/icon-reaction.svg" alt="" class="tasks2-img1">
      <p class="tasks2-p1">Reaction </p>
      <p class="tasks2-p2">80 / 100</p>
    </div>
    <div class="tasks3">
      <img src="./assets/images/icon-memory.svg" alt="" class="tasks3-img1">
      <p class="tasks2-p1">Memory</p>
      <p class="tasks2-p2">92 / 100</p>
    </div>
    <div class="tasks4">
      <img src="./assets/images/icon-verbal.svg" alt="" class="tasks4-img1">
      <p class="tasks2-p1">Verbal</p>
      <p class="tasks2-p2">61 / 100</p>
    </div>
    <div class="tasks5">
      <img src="./assets/images/icon-visual.svg" alt="" class="tasks5-img1">
      <p class="tasks2-p1">Visual</p>
      <p class="tasks2-p2">72 / 100</p>
    </div>
    </div>
    <p class="tasks-p">Continue</p>
    </div>
  </section>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
